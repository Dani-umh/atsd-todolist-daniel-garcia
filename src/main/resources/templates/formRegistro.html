<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments :: head (titulo='Registro')"></head>

<body>

<div class="container">

    <h2>Register</h2>

    <!-- Mostrar error si existe -->
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form method="post" th:action="@{/registro}" th:object="${registroData}">

        <!-- Email -->
        <div class="form-group">
            <label>Email</label>
            <input type="email"
                   th:field="*{email}"
                   class="form-control"
                   required>
        </div>

        <!-- Password -->
        <div class="form-group">
            <label>Password</label>
            <input type="password"
                   th:field="*{password}"
                   class="form-control"
                   required>
        </div>

        <!-- Nombre -->
        <div class="form-group">
            <label>Name</label>
            <input type="text"
                   th:field="*{nombre}"
                   class="form-control"
                   required>
        </div>

        <!-- Fecha de nacimiento -->
        <div class="form-group">
            <label>Birth date</label>
            <input type="date"
                   th:field="*{fechaNacimiento}"
                   class="form-control">
        </div>

        <!-- NUEVO: Checkbox solo si no existe administrador -->
        <div class="form-group" th:if="${!existeAdministrador}">
            <label>
                <input type="checkbox" th:field="*{admin}">
                Register as administrator
            </label>
        </div>

        <br>

        <button type="submit" class="btn btn-primary">
            Register
        </button>

    </form>

</div>

<div th:replace="fragments :: javascript"></div>

</body>
</html>
